async function cleanCompletedOrders(){
  var days=prompt('清理多少天前的已完结订单？（例如：30、60、90）','30');
  if(!days||isNaN(days)||days<1)return;
  if(!confirm('确定删除 '+days+' 天前的已完结订单吗？\n\n此操作不可恢复！'))return;
  showToast('正在清理...','info');
  try{
    var cutoff=new Date(Date.now()-days*86400000).toISOString();
    var res=await DB.collection(COL.ORDERS).where({order_status:'已完结'}).orderBy('created_at','asc').limit(500).get();
    var orders=res.data||[];
    if(orders.length===0){showToast('没有符合条件的已完结订单','error');return;}
    var deleted=0;
    for(var i=0;i<orders.length;i++){
      var o=orders[i];
      if(o.updated_at>=cutoff)continue;
      if(Array.isArray(o.file_ids))for(var j=0;j<o.file_ids.length;j++)try{await TCB.deleteFile({fileList:[o.file_ids[j].file_id||o.file_ids[j]]}).catch(function(){})}catch(e){}
      await API.deleteOrder(o._id);
      deleted++;
    }
    showToast('已清理 '+deleted+' 条已完结订单','success');
    if(typeof loadOrders==='function')loadOrders();
    if(typeof loadDashboard==='function')loadDashboard();
  }catch(e){showToast('清理失败: '+e.message,'error');}
}
</script>
<script>
;(function(){
  function injectSupervisor(){
    var rows=document.querySelectorAll("#spContainer table tbody tr");
    rows.forEach(function(tr){
      if(tr.dataset.sv)return;
      tr.dataset.sv="1";
      var id=tr.getAttribute("data-id");
      if(!id)return;
      // 收集所有业务员名字
      var allNames=[];
      document.querySelectorAll("#spContainer input[id^=\"spname-\"]").forEach(function(inp){
        var v=inp.value.trim();
        if(v)allNames.push(v);
      });
      var nameEl=tr.querySelector('input[id^="spname-"]');
      var name=nameEl?nameEl.value:"";
      // 插入主管归属TD
      var td=document.createElement("td");
      td.style.cssText="font-size:11px;white-space:nowrap;min-width:160px";
      // 归属下拉
      var sel=document.createElement("select");
      sel.style.cssText="font-size:10px;padding:1px 3px;border:1px solid #ddd;border-radius:3px;max-width:100px";
      sel.innerHTML='<option value="">-归属-</option>';
      allNames.forEach(function(n){
        if(n!==name)sel.innerHTML+='<option value="'+n.replace(/"/g,"&quot;")+'">'+n.replace(/</g,"&lt;")+'</option>';
      });
      sel.onchange=function(){
        if(!this.value)return;
        API.updateSalesperson(id,{supervisor_id:this.value}).then(function(r){
          if(r.error)showToast("设置失败: "+r.error.message,"error");
          else showToast("已设置归属主管","success");
        });
      };
      // 预选当前归属主管
      
      td.appendChild(document.createTextNode("归属："));
      td.appendChild(sel);
      // 预选：从渲染数据中查找 supervisor_id
      (function(){
        var listEl=document.getElementById("spContainer");
        if(!listEl||!listEl._spCache)return;
        var sp=listEl._spCache[id];
        if(sp&&sp.supervisor_id)sel.value=sp.supervisor_id;
      })();
      // 插入到操作列前面
      var tds=tr.querySelectorAll("td");
      if(tds.length>=5)tds[4].after(td);
    });
  }
  injectSupervisor();
  new MutationObserver(function(){injectSupervisor()}).observe(document.getElementById("spContainer")||document.body,{childList:true,subtree:true});
  setTimeout(injectSupervisor,800);
})();
</script>
