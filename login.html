<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,"><link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png"><link rel="icon" type="image/png" sizes="64x64" href="favicon-64.png"><link rel="apple-touch-icon" sizes="180x180" href="apple-touch.png"><title>进度回复系统 · 登录</title><style>body{background:#fdfbf7;font-family:-apple-system,BlinkMacSystemFont,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;margin:0;padding:20px}.wrap{width:100%;max-width:360px}.tag{display:inline-block;padding:3px 18px;background:rgba(255,255,255,.85);border:1.5px dashed #d4c8b8;border-radius:20px;font-size:11px;color:#b0a090;transform:rotate(-1deg);text-align:center;margin-bottom:14px}.card{background:#fff;border-radius:14px;padding:26px 22px;box-shadow:0 1px 3px rgba(0,0,0,.04);border:1px solid #efe9df}.card h2{font-size:16px;font-weight:500;color:#4a3f35;text-align:center;margin:0 0 4px}.sub{text-align:center;color:#b0a090;font-size:12px;margin-bottom:22px}.err{background:#fef0f0;color:#c44;padding:10px 14px;border-radius:10px;font-size:12px;margin-bottom:14px;display:none}.fld{margin-bottom:14px}.fld label{display:block;font-size:12px;font-weight:500;color:#4a3f35;margin-bottom:4px}.fld input{width:100%;box-sizing:border-box;padding:10px 12px;border:1px solid #e8e0d5;border-radius:10px;font-size:14px;background:#fdfbf7;outline:none;transition:border-color .2s}.fld input:focus{border-color:#667eea;box-shadow:0 0 0 3px rgba(102,126,234,.08)}.btn-login{width:100%;padding:10px;border:none;border-radius:24px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;font-size:13px;font-weight:500;cursor:pointer;letter-spacing:1px;transition:opacity .2s}.btn-login:hover{opacity:.9}.foot{text-align:center;margin-top:18px;font-size:11px;color:#c4bab0;border-bottom:1.5px dashed #e8e0d5;padding-bottom:12px}</style></head><body><div class="wrap"><div class="card"><div class="tag">📋 进度回复系统</div><h2>欢迎登录</h2><p class="sub">请使用管理员分配的账号登录</p><div id="loginError" class="err"></div><form id="loginForm"><div class="fld"><label for="email">邮箱地址</label><input type="email" id="email" required autocomplete="email" placeholder="name@company.com"></div><div class="fld"><label for="password">密码</label><input type="password" id="password" required autocomplete="current-password" placeholder="输入密码"></div><button type="submit" class="btn-login">登 录</button></form><p class="foot">还没有账号？请联系管理员为您创建</p></div></div><script src="https://static.cloudbase.net/cloudbase-js-sdk/2.28.6/cloudbase.full.js"></script><script src="js/config.js"></script><script src="js/auth.js"></script><script>Auth.isLoggedIn()&&Auth.redirectByRole(),document.getElementById("loginForm").addEventListener("submit",async e=>{e.preventDefault();var t=document.getElementById("email").value.trim(),n=document.getElementById("password").value,o=document.getElementById("loginError"),r=(o.style.display="none",o.textContent="",e.target.querySelector("button")),s=(r.disabled=!0,r.textContent="登录中...",await Auth.login(t,n));s.success?(r.textContent="跳转中...",setTimeout(()=>Auth.redirectByRole(),300)):(o.textContent=s.error||"登录失败",o.style.display="block",r.disabled=!1,r.textContent="登 录")})</script></body></html>
