<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png"><link rel="icon" type="image/png" sizes="64x64" href="favicon-64.png"><link rel="apple-touch-icon" sizes="180x180" href="apple-touch.png"><title>进度回复系统 · 登录</title><link rel="stylesheet" href="css/style.css"></head><body><div class="login-container"><div class="login-box"><h2>📦 进度回复系统</h2><p style="text-align:center;color:#888;font-size:13px;margin-bottom:20px"> · 请使用管理员分配的账号登录</p><div id="loginError" class="login-error"></div><form id="loginForm"><div class="form-group"><label for="email">邮箱地址</label> <input type="email" id="email" class="form-control" required autocomplete="email"></div><div class="form-group"><label for="password">密码</label> <input type="password" id="password" class="form-control" required autocomplete="current-password"></div><button type="submit" class="btn btn-primary">登 录</button></form><div style="text-align:center;margin-top:20px;padding-top:16px;border-top:1px solid #eee"><p style="font-size:12px;color:#aaa">还没有账号？请联系管理员为您创建</p><p style="font-size:10px;color:#ccc;margin-top:6px"></p></div></div></div><script src="https://static.cloudbase.net/cloudbase-js-sdk/2.28.6/cloudbase.full.js"></script><script src="js/config.js"></script><script src="js/auth.js"></script><script>Auth.isLoggedIn()&&Auth.redirectByRole(),document.getElementById("loginForm").addEventListener("submit",async e=>{e.preventDefault();var t=document.getElementById("email").value.trim(),n=document.getElementById("password").value,o=document.getElementById("loginError"),e=(o.style.display="none",o.textContent="",e.target.querySelector('button[type="submit"]')),t=(e.disabled=!0,e.textContent="登录中...",await Auth.login(t,n));t.success?(e.textContent="跳转中...",setTimeout(()=>Auth.redirectByRole(),300)):(o.textContent=t.error||"登录失败",o.style.display="block",e.disabled=!1,e.textContent="登 录")})</script></body></html>
