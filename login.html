<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png"><link rel="icon" type="image/png" sizes="64x64" href="favicon-64.png"><link rel="apple-touch-icon" sizes="180x180" href="apple-touch.png"><title>进度回复系统 · 登录</title><style>body{background:#f4f2ef;font-family:-apple-system,BlinkMacSystemFont,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;margin:0;padding:20px}.wrap{width:100%;max-width:360px}.card{background:#fff;border-radius:16px;padding:36px 28px;box-shadow:0 1px 2px rgba(0,0,0,.04),0 4px 16px rgba(0,0,0,.04)}.card h2{font-size:17px;font-weight:500;color:#2c2c2c;text-align:center;margin:0 0 4px}.sub{text-align:center;color:#999;font-size:13px;margin-bottom:24px}.err{background:#fef0f0;color:#c44;padding:10px 14px;border-radius:10px;font-size:12px;margin-bottom:14px;display:none}.fld{margin-bottom:14px}.fld label{display:block;font-size:12px;font-weight:500;color:#555;margin-bottom:4px}.fld input{width:100%;padding:10px 12px;border:1px solid #e0dcd5;border-radius:10px;font-size:14px;background:#faf9f6;outline:none;transition:border-color .2s}.fld input:focus{border-color:#888}.btn-login{width:100%;padding:11px;border:none;border-radius:10px;background:#3d3d3d;color:#fff;font-size:14px;font-weight:500;cursor:pointer;transition:background .2s}.btn-login:hover{background:#555}.footer{text-align:center;margin-top:18px;padding-top:14px;border-top:1px solid #eee;font-size:12px;color:#aaa}</style></head><body><div class="wrap"><div class="card"><h2>进度回复系统</h2><p class="sub">请使用管理员分配的账号登录</p><div id="loginError" class="err"></div><form id="loginForm"><div class="fld"><label for="email">邮箱地址</label><input type="email" id="email" required autocomplete="email" placeholder="name@company.com"></div><div class="fld"><label for="password">密码</label><input type="password" id="password" required autocomplete="current-password" placeholder="输入密码"></div><button type="submit" class="btn-login">登 录</button></form><p class="footer">还没有账号？请联系管理员为您创建</p></div></div><script src="https://static.cloudbase.net/cloudbase-js-sdk/2.28.6/cloudbase.full.js"></script><script src="js/config.js"></script><script src="js/auth.js"></script><script>Auth.isLoggedIn()&&Auth.redirectByRole(),document.getElementById("loginForm").addEventListener("submit",async e=>{e.preventDefault();var t=document.getElementById("email").value.trim(),n=document.getElementById("password").value,o=document.getElementById("loginError"),r=(o.style.display="none",o.textContent="",e.target.querySelector("button")),s=(r.disabled=!0,r.textContent="登录中...",await Auth.login(t,n));s.success?(r.textContent="跳转中...",setTimeout(()=>Auth.redirectByRole(),300)):(o.textContent=s.error||"登录失败",o.style.display="block",r.disabled=!1,r.textContent="登 录")})</script></body></html>
