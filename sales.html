;margin-bottom:8px;">查询「${App.escapeHtml(e)}」的订单</h3><p style="color:#999;font-size:14px;">可以按到款单号、订单状态筛选</p></div>`}async function searchOrders(){if(currentSp){var o=document.getElementById("resultContainer");App.showLoading(o);try{let e=(await DB.collection(COL.ORDERS).orderBy("created_at","desc").limit(1e3).get()).data||[],t=(currentSp.all||(e=e.filter(e=>e.salesperson_name===currentSp.name)),document.getElementById("searchInvoice").value.trim()),n=document.getElementById("searchStatus").value;t&&(e=e.filter(e=>e.invoice_no&&-1!==e.invoice_no.indexOf(t))),"__empty__"===n?e=e.filter(e=>!e.order_status):n&&(e=e.filter(e=>e.order_status===n)),e&&0!==e.length?renderResults(e):o.innerHTML='<div class="card" style="margin-top:20px;text-align:center;padding:30px;"><p style="font-size:36px;">🔍</p><p style="color:#999;">没有找到匹配的订单</p></div>'}catch(e){App.showError(o,"查询失败: "+e.message)}}else showModal()}function renderResults(e){var t=document.getElementById("resultContainer"),n=e.reduce((e,t)=>e+(t.quantity||0),0);let o={},s=(e.forEach(e=>{o[e.order_status]=(o[e.order_status]||0)+1}),`<div style="display:flex;gap:20px;flex-wrap:wrap;margin-bottom:16px;padding:12px;background:#f8f9ff;border-radius:8px;">

<script>
function toggleNotifyPanel(){
  var p = document.getElementById('notifyPanel');
  if (p.style.display === 'none') { p.style.display = 'block'; renderNotifyList(); }
  else p.style.display = 'none';
}
async function updateNotifyBadge(){
  if (!currentSp || !currentSp.name) return;
  var count = await Notifications.getUnread(currentSp.name);
  var badge = document.getElementById('notifyBadge');
  if (count > 0) {
    badge.style.display = 'inline'; badge.textContent = count > 99 ? '99+' : count;
  } else badge.style.display = 'none';
}
function formatNotifyTime(ts){
  var d = (Date.now() - new Date(ts).getTime()) / 1000;
  if (d < 60) return '刚刚';
  if (d < 3600) return Math.floor(d/60) + '分钟前';
  if (d < 86400) return Math.floor(d/3600) + '小时前';
  return Math.floor(d/86400) + '天前';
}
async function renderNotifyList(){
  if (!currentSp || !currentSp.name) return;
  var list = await Notifications.getList(currentSp.name, 30);
  var el = document.getElementById('notifyList');
  if (!list.length) { el.innerHTML = '<div style="padding:20px;text-align:center;color:#999;font-size:13px">暂无通知</div>'; return; }
  var h = '';
  for (var i = 0; i < list.length; i++) {
    var n = list[i], isRead = !!n.read;
    h += '<div class="notify-item'+(isRead?'':' unread')+'" data-nid="'+n._id+'" data-inv="'+(n.invoice_no||'')+'" onclick="onNotifyClick(this)" style="'+(isRead?'opacity:.7':'')+'">';
    if (!isRead) h += '<span class="notify-dot"></span>';
    h += '<span class="nt-msg">'+n.message+'</span><span class="nt-time">'+formatNotifyTime(n.created_at)+'</span></div>';
  }
  el.innerHTML = h;
}
async function onNotifyClick(el){
  await Notifications.markRead(el.dataset.nid);
  document.getElementById('notifyPanel').style.display = 'none';
  updateNotifyBadge();
  var inv = el.dataset.inv;
  if (inv) { document.getElementById('searchInvoice').value = inv; searchOrders(); }
}
document.addEventListener('click', function(e){
  var p = document.getElementById('notifyPanel');
  var b = document.getElementById('notifyBell');
  if (p.style.display !== 'none' && !p.contains(e.target) && !b.contains(e.target)) {

  }

setTimeout(function(){
  var bell = document.getElementById('notifyBell');
  if (bell) {
    bell.addEventListener('click', function() {
      if ('Notification' in window && Notification.permission === 'default') {
        Notification.requestPermission();
      }
    }, {once: true});
  }
}, 2000);
setInterval(function(){
  if (currentSp && currentSp.name) {
    try {
      if ('Notification' in window && Notification.permission === 'granted') {
        var _nc = window._lastNc || 0;

          window._lastNc = c;
        }).catch(function(){});
      }
    } catch(e) {}

}, 30000);
</script>
