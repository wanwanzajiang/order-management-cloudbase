entById("userName").textContent=e.full_name||e.email,document.getElementById("userRole").textContent=App.getRoleName(e.role),localStorage.getItem("cb_current_salesperson"));if(e)try{currentSp=JSON.parse(e)}catch(e){}(currentSp&&currentSp.name?(showIdentityBar(),showWelcome):showModal)()}function showModal(){document.getElementById("codeModal").style.display="flex",document.getElementById("codeInput").value="",document.getElementById("codeError").textContent="",setTimeout(()=>document.getElementById("codeInput").focus(),300)}function hideModal(){document.getElementById("codeModal").style.display="none"}async function verifyCode(){var e=document.getElementById("codeInput").value.trim().toUpperCase(),t=document.getElementById("codeError");e?(e=(await API.getSalespersonByCode(e)).data,e?!1===e.is_active?t.textContent="⛔ 该业务员已被停用":(currentSp={id:e._id||e.id,name:e.name,access_code:e.access_code},localStorage.setItem("cb_current_salesperson",JSON.stringify(currentSp)),hideModal(),showIdentityBar(),showToast("✅ 欢迎，"+currentSp.name+"！","success"),showWelcome()):t.textContent="❌ 识别码无效"):t.textContent="请输入识别码"}function switchSalesperson(){currentSp=null,localStorage.removeItem("cb_current_salesperson"),document.getElementById("identityBar").style.display="none",document.getElementById("resultContainer").innerHTML="",showModal()}function showIdentityBar(){currentSp&&(document.getElementById("identityBar").style.display="flex",document.getElementById("currentSpName").textContent=currentSp.name,document.getElementById("currentSpCode").textContent=currentSp.access_code,document.getElementById("hintSpName").textContent=currentSp.name)}function showWelcome(){var e=currentSp?currentSp.name:"";document.getElementById("resultContainer").innerHTML=`<div class="card" style="margin-top:20px;text-align:center;padding:40px 20px;background:#f8f9ff;border-radius:10px;border:2px dashed #ccc;"><p style="font-size:40px;margin-bottom:16px;">📋</p><h3 style="color:#555;margin-bottom:8px;">查询「${App  </div>
 </div>
 <div class="oc-actions">

 </div>
 </div>`}),t.innerHTML=s}function renderProducts(e){if(!e)return'<span style="color:#ccc;padding:8px;">-</span>';let t=null;if("string"==typeof e&&e.startsWith("["))try{t=JSON.parse(e)}catch(e){}return t&&Array.isArray(t)&&0<t.length?t.map(e=>`<div class="pi-item">${e.brand?`<span class="pi-brand">${App.escapeHtml(e.brand)}</span>`:""}${`<span class="pi-model">${App.escapeHtml(e.model||"-")}</span>`} ${e.qty?`<span class="pi-qty">×${e.qty}</span>`:""} ${e.delivery?`<span class="pi-delivery">${App.escapeHtml(e.delivery)}</span>`:""}</div>`).join(""):`<span style="color:#555;font-size:12px;padding:8px;">${App.escapeHtml(e)}</span>`}async function sfUpdate(e,t,n){var o={};n=""!==n&&null!==n&&"null"!==n?n:null,"true"===n&&(n=!0),"false"===n&&(n=!1),o[t]=n,o.has_new_photo=!1,await API.updateOrder(e,o)}function resetSearch(){document.getElementById("searchInvoice").value="",document.getElementById("searchStatus").value="",showWelcome()}Auth.requireRole([CONFIG.ROLES.SALES,CONFIG.ROLES.ADMIN,CONFIG.ROLES.WAREHOUSE])&&init(),document.addEventListener("keydown",e=>{"Enter"===e.key&&"flex"===document.getElementById("codeModal").style.display&&verifyCode()})</script></body></html>
